<!-- 【後で本物のアイコンに差し替え】暫定メンダコSVGプレースホルダ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220" role="img" aria-label="メンダコのアイコン">
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#b8ecf5"/>
      <stop offset="48%" stop-color="#5cb8cc"/>
      <stop offset="100%" stop-color="#2878a0"/>
    </radialGradient>
    <radialGradient id="bellyGrad" cx="50%" cy="45%" r="52%">
      <stop offset="0%" stop-color="#e6f9fd" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a8e6f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="finGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#9adcea"/>
      <stop offset="100%" stop-color="#3a9cb5"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0d2847" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- スカート状の触手（丸いふんわりスカート・5つの丸みのあるぽこぽこ） -->
  <path d="
    M 52 140
    Q 52 162 62 168
    Q 72 162 72 140
    Q 80 165 90 170
    Q 100 165 100 140
    Q 108 165 118 170
    Q 128 162 128 140
    Q 136 162 146 168
    Q 156 162 148 140
  " fill="#4ab8cc" opacity="0.95"/>

  <!-- ボディ本体 -->
  <path d="
    M 100 28
    C 140 28, 168 55, 168 92
    C 168 128, 148 148, 100 148
    C 52 148, 32 128, 32 92
    C 32 55, 60 28, 100 28
    Z
  " fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- お腹ハイライト -->
  <ellipse cx="94" cy="85" rx="44" ry="46" fill="url(#bellyGrad)"/>

  <!-- 耳ヒレ（左） -->
  <ellipse cx="34" cy="72" rx="18" ry="12" fill="url(#finGrad)" transform="rotate(-25 34 72)"/>
  <ellipse cx="34" cy="70" rx="10" ry="6" fill="#cef2f8" opacity="0.5" transform="rotate(-25 34 72)"/>

  <!-- 耳ヒレ（右） -->
  <ellipse cx="166" cy="72" rx="18" ry="12" fill="url(#finGrad)" transform="rotate(25 166 72)"/>
  <ellipse cx="166" cy="70" rx="10" ry="6" fill="#cef2f8" opacity="0.5" transform="rotate(25 166 72)"/>

  <!-- 目（左） -->
  <circle cx="79" cy="88" r="16" fill="#0d2847"/>
  <circle cx="79" cy="88" r="9.5" fill="#163554"/>
  <circle cx="79" cy="88" r="6" fill="#ddeef5"/>
  <circle cx="83" cy="83" r="3" fill="#fff"/>
  <circle cx="76" cy="93" r="1.4" fill="#fff" opacity="0.55"/>

  <!-- 目（右） -->
  <circle cx="121" cy="88" r="16" fill="#0d2847"/>
  <circle cx="121" cy="88" r="9.5" fill="#163554"/>
  <circle cx="121" cy="88" r="6" fill="#ddeef5"/>
  <circle cx="125" cy="83" r="3" fill="#fff"/>
  <circle cx="118" cy="93" r="1.4" fill="#fff" opacity="0.55"/>

  <!-- ほっぺ -->
  <ellipse cx="63" cy="108" rx="13" ry="8" fill="#f0a0c0" opacity="0.4"/>
  <ellipse cx="137" cy="108" rx="13" ry="8" fill="#f0a0c0" opacity="0.4"/>

  <!-- 口 -->
  <path d="M 87 116 Q 100 128 113 116" stroke="#2070a0" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 発光縁取り -->
  <path d="
    M 100 28
    C 140 28, 168 55, 168 92
    C 168 128, 148 148, 100 148
    C 52 148, 32 128, 32 92
    C 32 55, 60 28, 100 28
    Z
  " fill="none" stroke="#5fd3e0" stroke-width="1.8" opacity="0.35"/>
</svg>
