<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dev Journey - 学習記録</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Dev Journey</h1>
        <p>エンジニアを目指すJavaScriptなどの学習ログ</p>
    </header>

    <main>
        <section id="tracker">
            <h2>📊 今日の学習を記録する</h2>
            <div class="input-area">
                <input type="text" id="taskInput" placeholder="例：JavaScriptのDOM操作を学んだ">
                <button id="addBtn">記録する</button>
            </div>
            <ul id="logList">
                </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
