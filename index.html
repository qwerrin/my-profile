<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanaの自己紹介ページ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#" class="logo">Nana</a>
      <nav>
        <ul class="nav-list">
          <li><a href="#about">About</a></li>
        </ul>
      </nav>
      <button id="themeToggle" class="theme-toggle" aria-label="テーマ切り替え">🌓</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <p class="hero-greeting">Hi, I'm</p>
        <h1 class="hero-title">Nana</h1>
        <p class="hero-subtitle">Web Developer in Training</p>
        <p class="hero-description">自己紹介ページ</p>
      </div>
    </section>

    <section id="about" class="section">
        <h2>About</h2>
        <div class="about-grid">
          <img src="mendako.png" alt="Nanaのアバター画像" class="avatar">
          <div class="about-text">
            <p>
              はじめまして。HTML, CSS, JavaScriptなどを学習中の初心者です。2026年5月から学習を始めました。
              学習はHTML/CSS、JavaScript、TypeScript、Reactと進めていく予定です。
            </p>
            <p>
              休日は勉強と読書が趣味です。
            </p>
          </div>
        </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <ul class="social-links">
        <li><a href="https://github.com/qwerrin" aria-label="GitHub">GitHub</a></li>
        <li><a href="https://x.com/nanairo_dev" aria-label="X (旧 Twitter)">X</a></li>
        <li><a href="https://zenn.dev/nanairoha" aria-label="Zenn">Zenn</a></li>
      </ul>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
